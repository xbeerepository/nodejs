schema-version: 1.0

port: "{% port %}"

persistent-dir: app:{% app %}

var:
  version: 12.18.3
  yarnVersion: 1.22.4
  app: /app
  port: 3000
  user: default

provision:
  - url: https://nodejs.org/dist/v{% version %}/node-v{% version %}-linux-x64.tar.xz
  - url: https://github.com/yarnpkg/yarn/releases/download/v{% yarnVersion %}/yarn-v{% yarnVersion %}.tar.gz
  - systempath: /opt/node-v{% version %}-linux-x64/bin
  - systempath: /opt/yarn-v{% yarnVersion %}/bin
  - env: NODE_VERSION={% version %}
  - env: NODE_PORT={% port %}
  - user: "{% user %}"

deploy:
  - copy:
     resource: app
     topath: "{% app %}"
  - shell:
     cmd: npm install
     directory: "{% app %}"

directory: "{% app %}"
user: "{% user %}" 

command:
  node: node {{ .args }}
  npm: npm {{ .args }}
  yarn: yarn {{ .args }}
